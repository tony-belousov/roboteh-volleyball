<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Волейбольная статистика</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Волейбол стат">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div id="app">
    <!-- Главное меню -->
    <div class="main-menu visible">
        <h1>Главное меню</h1>
        <button id="start-score">Ведение счёта</button>
        <button id="match-stats">Статистика матча</button>
        <button id="schedule">Расписание матчей</button>
        <button id="attendance">Журнал посещений</button>
        <button id="history">История матчей</button>
        <button id="help">Справка</button>
        <button id="sync-upload">📤 Отправить в облако</button>
        <button id="sync-download">📥 Загрузить из облака</button>
    </div>

    <!-- Экран счёта -->
    <div class="score-screen hidden">
        <button class="back-button">Назад</button>
        <div class="team-inputs">
            <input type="text" id="team1-name" placeholder="Команда 1">
            <input type="text" id="team2-name" placeholder="Команда 2">
            <button id="start-match">Начать матч</button>
        </div>
        <div class="score-board hidden">
            <div class="team team1">
                <h3 id="team1-title">Команда 1</h3>
                <div class="score" data-team="1">0</div>
                <div class="set-score" id="team1-set-score">0</div>
            </div>
            <div class="team team2">
                <h3 id="team2-title">Команда 2</h3>
                <div class="score" data-team="2">0</div>
                <div class="set-score" id="team2-set-score">0</div>
            </div>
            <div class="winner-message hidden" id="winner-message"></div>
        </div>
    </div>

    <!-- Экран статистики -->
    <div class="stats-screen hidden">
        <button class="back-button">Назад</button>
        <div class="match-info">
            <label>Дата матча: <input type="date" id="match-date"></label>
            <label>Соперник: <input type="text" id="opponent"></label>
            <label>Команда:
                <select id="team-select">
                    <option value="robotex">РОБОТЕХ</option>
                    <option value="robotex2">РОБОТЕХ 2.0</option>
                </select>
            </label>
            <button id="start-stats">Начать статистику</button>
        </div>

        <div class="lineup-selection hidden">
            <h2>Выберите стартовую шестёрку</h2>
            <div id="lineup-players-list" class="players-list"></div>
            <p>Выбрано: <span id="selected-count">0</span>/6</p>
            <button id="confirm-lineup" disabled>Подтвердить состав</button>
        </div>

        <div class="stats-main hidden">
            <div class="set-selector">
                Партия: <span id="current-set">1</span>
                <div class="set-dropdown hidden" id="set-dropdown">
                    <div class="set-option" data-set="1">1</div>
                    <div class="set-option" data-set="2">2</div>
                    <div class="set-option" data-set="3">3</div>
                    <div class="set-option" data-set="4">4</div>
                    <div class="set-option" data-set="5">5</div>
                </div>
            </div>

            <div class="volleyball-court">
                <div class="zone zone-4" data-zone="4">4</div>
                <div class="zone zone-3" data-zone="3">3</div>
                <div class="zone zone-2" data-zone="2">2</div>
                <div class="zone zone-5" data-zone="5">5</div>
                <div class="zone zone-6" data-zone="6">6</div>
                <div class="zone zone-1" data-zone="1">1</div>
            </div>

            <div class="player-selection hidden">
                <h3>Зона <span id="current-zone">1</span></h3>
                <select id="player-select"></select>
                <button id="confirm-player">👉 Подтвердить</button>
            </div>

            <div class="action-menu hidden">
                <h3>Действие</h3>
                <button class="action-btn" data-action="receive">Прием</button>
                <button class="action-btn" data-action="attack">Атака</button>
                <button class="action-btn" data-action="defense">Защита</button>
                <button class="action-btn" data-action="block">Блок</button>
                <button class="action-btn" data-action="serve">Подача</button>
                <button id="change-player" class="change-player-btn">Сменить игрока</button>
            </div>

            <div class="sub-menu hidden">
                <h4 id="sub-menu-title"></h4>
                <div class="sub-btns-container"></div>
            </div>

            <button id="save-stats" class="save-button">Завершить матч и сохранить</button>
        </div>

        <div class="stats-review hidden">
            <h3>Статистика матча</h3>
            <p id="review-match-info"></p>
            <div id="review-content"></div>
            <button id="download-excel" class="download-excel-btn">Скачать в XLSX</button>
            <button id="new-match-btn" class="new-match-btn">Новый матч</button>
        </div>
    </div>

    <!-- Расписание матчей -->
    <div class="schedule-screen hidden">
        <button class="back-button">Назад</button>
        <h2>Расписание матчей</h2>
        <div id="schedule-content" class="schedule-container"></div>
    </div>

    <!-- Журнал посещений -->
    <div class="attendance-screen hidden">
        <button class="back-button">Назад</button>
        <h2>Журнал посещений тренировок</h2>
        <div id="attendance-content"></div>
        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button id="fill-attendance" class="action-btn">Заполнить посещаемость</button>
            <button id="edit-attendance" class="action-btn secondary">Изменить данные</button>
        </div>
    </div>

    <!-- Модальное окно для заполнения/редактирования посещаемости -->
    <div id="attendance-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title"></h3>
            <div id="modal-date-selector" class="date-selector"></div>
            <div id="modal-players-list" class="players-list"></div>
            <button id="modal-done" class="action-btn">Готово</button>
            <button id="modal-cancel" class="action-btn secondary">Отмена</button>
        </div>
    </div>

    <!-- История матчей -->
    <div class="history-screen hidden">
        <button class="back-button">Назад</button>
        <h2>История матчей</h2>
        <div id="history-list"></div>
    </div>

    <!-- Справка (полная версия) -->
    <div class="help-screen hidden">
        <button class="back-button">Назад</button>
        <h2>Справка по приложению</h2>
        <div class="help-content">
            <!-- ... полное содержание справки, как в предыдущих версиях ... -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registered', reg))
            .catch(err => console.log('Service Worker registration failed', err));
    }
</script>
</body>
</html>
